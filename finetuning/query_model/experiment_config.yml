# ============================================================
# Experiment Config for NL → Cypher Query Fine-tuning
# Follows pattern from gllm_training reference code
# ============================================================

# --- Hyperparameters ---
fine_tune_hyperparam_1: &fine_tune_hyperparam_1_conf
  hyperparameters_id: "1"

  # ModelConfig
  max_seq_length: 4096
  torch_dtype: null
  load_in_8bit: true
  load_in_4bit: false
  trust_remote_code: false
  full_finetuning: false
  enable_thinking: false
  thinking_mode: "off"
  add_generation_prompt: false

  # LoraConfig
  r: 16
  lora_alpha: 16
  lora_dropout: 0.1
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  use_gradient_checkpointing: "unsloth"
  random_state: 3407
  use_rslora: false
  loftq_config: null
  task_type: "CAUSAL_LM"

  # TrainingConfig
  model_output_dir: "data/fine_tuned"
  dataset_num_proc: 2
  packing: false

  # Early stopping
  early_stopping_patience: 3
  early_stopping_threshold: 0.01

  # Batch size and gradient
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4

  # Learning rate
  learning_rate: 2.0e-5
  warmup_steps: 20
  warmup_ratio: 0.03

  # Epochs
  num_train_epochs: 4
  optim: "adamw_8bit"
  weight_decay: 0.1
  lr_scheduler_type: "linear"
  max_grad_norm: 1

  # Saving
  save_strategy: "steps"
  save_steps: 25
  save_total_limit: 3
  eval_strategy: "steps"
  eval_steps: 25
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

  # Misc
  seed: 3407
  report_to: "none"
  logging_steps: 10
  resume_from_checkpoint: false

# --- Storage Config ---
storage_config: &storage_config
  upload_to_cloud: false
  provider: "local"
  bucket_name: ""
  object_prefix: ""

# ============================================================
# Experiment 1: Qwen3-4B with Google Sheets data
# ============================================================
experiment_1:
  experiment_id: "1"
  hyperparameters: *fine_tune_hyperparam_1_conf
  storage_config: *storage_config
  topic: "LEGAL_KG_QUERY"
  model_name: "Qwen/Qwen3-4b"
  framework: "unsloth"
  multimodal: false

  # --- Google Sheets data source ---
  # TODO: Replace with actual spreadsheet ID
  spreadsheet_id: "YOUR_SPREADSHEET_ID_HERE"
  train_sheet: "training_data"
  validation_sheet: "validation_data"
  prompt_sheet: "prompt_template"
  prompt_name: "nl_to_cypher_1"

  column_mapping_config:
    input_columns:
      context: "context"
      question: "question"
    label_columns:
      generated_response: "response"

  save_processed_dataset: true
  output_processed_dir: "data/dataset"

# ============================================================
# Experiment 2: Qwen3-4B with local CSV data (no Sheets needed)
# ============================================================
experiment_2:
  experiment_id: "2"
  hyperparameters: *fine_tune_hyperparam_1_conf
  storage_config: *storage_config
  topic: "LEGAL_KG_QUERY"
  model_name: "Qwen/Qwen3-4b"
  framework: "unsloth"
  multimodal: false

  # --- Local CSV data source ---
  datasets_path: "finetuning/query_model/data"
  train_filename: "training_data.csv"
  validation_filename: "validation_data.csv"
  prompt_filename: "prompt_data.csv"
  prompt_name: "nl_to_cypher_1"
  dataset_text_field: "prompt"

  column_mapping_config:
    input_columns:
      context: "context"
      question: "question"
    label_columns: "response"

  save_processed_dataset: true
  output_processed_dir: "data/dataset"
